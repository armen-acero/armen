<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#131829"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(600 80) scale(620 420)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g transform="translate(80 80)">
    <rect width="56" height="56" rx="14" fill="url(#accent)"/>
    <text x="28" y="38" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#0a0e1a" text-anchor="middle">A</text>
  </g>
  <text x="80" y="300" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#ffffff">AI Automation &amp;</text>
  <text x="80" y="380" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="url(#accent)">Search Visibility</text>
  <text x="80" y="470" font-family="Inter, sans-serif" font-size="30" font-weight="500" fill="#94a3b8">Helping businesses grow, scale &amp; automate.</text>
  <text x="80" y="520" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#22d3ee">Book your AI Opportunity Audit →</text>
</svg>
